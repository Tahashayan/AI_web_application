<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | Professional Image Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --body-bg: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: #1e293b;
        }

        /* Modern Glassmorphism Navbar */
        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 0.75rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Nav Link Hover States */
        .nav-link {
            font-weight: 500;
            color: #64748b !important;
            transition: color 0.2s ease;
        }
        .nav-link:hover { color: #4f46e5 !important; }

        /* Unified Card Style */
        .card-modern {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease;
        }

        /* Buttons: Rounded & Subtle Gradients */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            font-weight: 600;
            border-radius: 10px;
            padding: 8px 20px;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            border: 2px solid #e2e8f0;
            color: #475569;
            font-weight: 600;
            border-radius: 10px;
        }

        .btn-outline-custom:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        /* Alert Styling */
        .alert {
            border: none;
            border-radius: 12px;
            font-weight: 500;
        }

        /* User Dropdown */
        .dropdown-menu {
            border: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 10px;
        }

        .dropdown-item {
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fs-4" href="{% url 'home' %}">
                <i class="bi bi-magic me-2"></i>AI Studio
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'subscription' %}">Pricing</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center">
                    {% if user.is_authenticated %}
                        <div class="dropdown">
                            <button class="btn btn-outline-custom dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-2"></i>{{ user.username }}
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end mt-2">
                                <li><a class="dropdown-item" href="{% url 'my_sub' %}"><i class="bi bi-credit-card me-2"></i>Subscription</a></li>
                                <li><a class="dropdown-item" href="{% url 'history' %}"><i class="bi bi-clock-history me-2"></i>My History</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                            </ul>
                        </div>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-muted fw-bold me-2">Login</a>
                        <a href="{% url 'register' %}" class="btn btn-primary px-4">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                    <i class="bi bi-info-circle-fill me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container mt-5">
        {% block content %}
            {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
